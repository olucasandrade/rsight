name: Release
on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          for TARGET in aarch64-apple-darwin x86_64-apple-darwin; do
            tar czf "rsight-${VERSION}-${TARGET}.tar.gz" -C "target/${TARGET}/release" rsight
          done
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: rsight-*.tar.gz

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF#refs/tags/}" -p "*.tar.gz"

      - name: Compute checksums and update formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          SHA_ARM64=$(sha256sum "rsight-${VERSION}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          SHA_X86=$(sha256sum "rsight-${VERSION}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')

          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/rsight.rb
          sed -i "s|<sha256-arm64>|${SHA_ARM64}|" Formula/rsight.rb
          sed -i "s|<sha256-x86_64>|${SHA_X86}|" Formula/rsight.rb
          sed -i -E "s|sha256 \"[a-f0-9]{64}\" # arm64|sha256 \"${SHA_ARM64}\" # arm64|" Formula/rsight.rb
          sed -i -E "s|sha256 \"[a-f0-9]{64}\" # x86_64|sha256 \"${SHA_X86}\" # x86_64|" Formula/rsight.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rsight.rb
          git diff --cached --quiet || git commit -m "chore: update formula checksums for ${GITHUB_REF#refs/tags/}"
          git push
